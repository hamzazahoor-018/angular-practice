<div>
	<h2 class="text-2xl">Details</h2>
	<p>ID: {{ id }}</p>
	<p class="mt-2 text-slate-300">This page is protected by the auth guard. Log in first to open a details page.</p>
	<div class="mt-4 rounded-lg border border-slate-800 p-4">
		<p class="text-sm text-slate-300">CanDeactivate demo</p>
		<p class="mt-2">Unsaved changes: <span class="font-medium">{{ hasUnsavedChanges ? 'Yes' : 'No' }}</span></p>
		<button
			(click)="toggleUnsavedChanges()"
			class="mt-3 rounded-lg bg-sky-500 px-4 py-2 font-medium text-slate-950 hover:bg-sky-400"
		>
			Toggle unsaved changes
		</button>
	</div>
	<a routerLink="/learn" class="text-sky-400 hover:underline">Back to list</a>
</div>
